}

html{
    scroll-behavior:smooth;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:var(--cream);
    color:var(--dark);
    overflow-x:hidden;
}

section{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:80px 20px;
    position:relative;
    overflow:hidden;
}

.content{
    max-width:1100px;

    position:relative;
    z-index:2;
}

h1{
    font-size:clamp(3rem,8vw,6rem);
    margin-bottom:20px;
}

p{
    font-size:1.2rem;
    line-height:1.8;
}

.story-photo{
    width:min(90vw,1000px);
    border-radius:30px;
    margin-bottom:40px;
    box-shadow:0 20px 60px rgba(0,0,0,.15);
}
